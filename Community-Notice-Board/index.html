<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Community Notice Board</title>
</head>
<body>
    <div id="container" class="container">
        <h1>Ethiopia Community Notice Board</h1>
        <div class="search_container">
            <label for="searchInput">Search Notices:</label>
            <input type="text" id="searchInput" class="searchInput" placeholder="Search ">
        </div>
        <div class="filter_container">
            <button class="all" id="all">All</button>
            <button class="announcement" id="announcement">Announcement</button>
            <button class="event" id="event">Event</button>
            <button class="urgent" id="urgent">Urgent</button>
        </div>
        <div  id="card_container" class="card-container">

        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
